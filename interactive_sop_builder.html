<div class="builder-container">
    <div class="builder-panel">
        <h3>Modular SOP Builder Tool</h3>
        
        <div class="form-group">
            <label>Procedure Title</label>
            <input type="text" id="sopTitle" placeholder="e.g., Heavy Armor Maintenance Sequence" oninput="updatePreview()">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>SOP Identifier Code</label>
                <input type="text" id="sopId" placeholder="SOP-MNT-101" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Security Level</label>
                <select id="sopSecurity" onchange="updatePreview()">
                    <option value="UNCLASSIFIED">Unclassified</option>
                    <option value="CONFIDENTIAL">Confidential</option>
                    <option value="SECRET">Secret</option>
                </select>
            </div>
        </div>

        <!-- Dynamic Action Step Stack -->
        <div class="form-group">
            <label>Tactical Execution Steps</label>
            <div id="stepsContainer">
                <div class="step-input-row">
                    <span class="step-num">1</span>
                    <input type="text" class="step-field" placeholder="Enter operational command directive..." oninput="updatePreview()">
                </div>
            </div>
            <button class="secondary-btn" onclick="addStepRow()">+ Add Next Sequence Step</button>
        </div>

        <div class="builder-actions">
            <button class="export-btn" onclick="exportJSONOutput()">Compile & Lock Data Structure</button>
        </div>
    </div>

    <!-- Live Compilation View Pane -->
    <div class="preview-panel">
        <div class="preview-header">
            <span>LIVE INTERACTIVE MONITOR PREVIEW</span>
            <span id="previewBadge" class="p-badge">UNCLASSIFIED</span>
        </div>
        <div class="preview-body">
            <h1 id="prevIdTitle">SOP-XXX: Document Title</h1>
            <div class="meta-divider"></div>
            <h4>Mandatory Action Protocol Steps:</h4>
            <ol id="prevSteps">
                <li style="color:#64748b;">Awaiting step generation input details...</li>
            </ol>
        </div>
    </div>
</div>

<style>
    .builder-container { display: flex; gap: 30px; background: #0f172a; padding: 25px; border-radius: 8px; border: 1px solid #1e293b; font-family: system-ui, sans-serif; }
    .builder-panel { flex: 1; display: flex; flex-direction: column; gap: 18px; }
    .preview-panel { flex: 1; background: #1e293b; border-radius: 6px; border: 1px solid #334155; display: flex; flex-direction: column; }
    h3 { margin: 0; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; font-size: 16px; border-left: 3px solid #38bdf8; padding-left: 8px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-row { display: flex; gap: 15px; }
    .form-row .form-group { flex: 1; }
    label { font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: 600; }
    input, select { background: #0b0f19; border: 1px solid #334155; padding: 10px; border-radius: 4px; color: #fff; font-size: 14px; }
    input:focus, select:focus { outline: 1px solid #38bdf8; }
    .step-input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .step-num { color: #38bdf8; font-family: monospace; font-weight: bold; width: 15px; }
    .step-field { flex: 1; }
    .secondary-btn { background: transparent; border: 1px dashed #475569; color: #94a3b8; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .secondary-btn:hover { border-color: #38bdf8; color: #fff; }
    .export-btn { background: #10b981; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; margin-top: 10px; }
    .export-btn:hover { background: #059669; }
    
    /* Preview Pane Sub-styles */
    .preview-header { background: #0b0f19; padding: 10px 15px; font-size: 11px; font-weight: bold; color: #64748b; display: flex; justify-content: space-between; align-items: center; border-radius: 6px 6px 0 0; }
    .p-badge { padding: 2px 6px; border-radius: 3px; font-size: 10px; background: #475569; color: #fff; }
    .preview-body { padding: 25px; color: #e2e8f0; }
    .preview-body h1 { font-size: 20px; margin: 0 0 10px 0; color: #fff; }
    .meta-divider { height: 1px; background: #334155; margin-bottom: 20px; }
    .preview-body h4 { margin: 0 0 10px 0; font-size: 13px; color: #38bdf8; text-transform: uppercase; }
    .preview-body ol { margin: 0; padding-left: 20px; font-size: 14px; color: #cbd5e1; }
    .preview-body li { margin-bottom: 8px; }
</style>

<script>
    function addStepRow() {
        const container = document.getElementById('stepsContainer');
        const nextNum = container.querySelectorAll('.step-input-row').length + 1;
        
        const row = document.createElement('div');
        row.className = 'step-input-row';
        row.innerHTML = `
            <span class="step-num">${nextNum}</span>
            <input type="text" class="step-field" placeholder="Enter operational command directive..." oninput="updatePreview()">
        `;
        container.appendChild(row);
        updatePreview();
    }

    function updatePreview() {
        // Collect Header Information
        const title = document.getElementById('sopTitle').value || "Document Title";
        const id = document.getElementById('sopId').value || "SOP-XXX";
        const security = document.getElementById('sopSecurity').value;
        
        // Render Text elements
        document.getElementById('prevIdTitle').innerText = `${id}: ${title}`;
        
        // Update security level display badge
        const badge = document.getElementById('previewBadge');
        badge.innerText = security;
        badge.style.background = security === 'SECRET' ? '#ef4444' : (security === 'CONFIDENTIAL' ? '#f59e0b' : '#475569');

        // Compile and process task lists
        const stepFields = document.querySelectorAll('.step-field');
        const listContainer = document.getElementById('prevSteps');
        listContainer.innerHTML = "";
        
        let activeStepsCount = 0;
        stepFields.forEach(field => {
            if(field.value.trim() !== "") {
                const li = document.createElement('li');
                li.innerText = field.value;
                listContainer.appendChild(li);
                activeStepsCount++;
            }
        });

        if(activeStepsCount === 0) {
            listContainer.innerHTML = `<li style="color:#64748b;">Awaiting step generation input details...</li>`;
        }
    }

    function exportJSONOutput() {
        const stepFields = document.querySelectorAll('.step-field');
        const stepsArray = [];
        stepFields.forEach(f => { if(f.value.trim() !== "") stepsArray.push(f.value.trim()); });

        const finalizedPayload = {
            "sop_id": document.getElementById('sopId').value,
            "title": document.getElementById('sopTitle').value,
            "classification": document.getElementById('sopSecurity').value,
            "steps": stepsArray
        };
        
        console.log("FINALIZED ENCRYPTED BLUEPRINT:", finalizedPayload);
        alert("SOP Draft structural schema created successfully. Output sent securely to system log console tracking.");
    }
</script>
