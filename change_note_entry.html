<!-- Insert this interface node directly beneath the primary control workbench layout -->
<div class="audit-workspace">
    
    <!-- Left Interaction Node: Change Input Form -->
    <div class="audit-form-panel">
        <h4>Publish & Document Release Node</h4>
        <p class="panel-subtext">Every save action requires verification and logging before database compilation.</p>
        
        <div class="input-block">
            <label>Authorizing Operator Token Callsign</label>
            <input type="text" id="logOperator" value="Staff Sgt. K. Reyes">
        </div>
        
        <div class="input-block">
            <label>Release / Revision Change Notes</label>
            <textarea id="logSummary" placeholder="Specify precisely what operational elements, parameters, or instructions were adjusted in this build framework..."></textarea>
        </div>

        <div class="input-block">
            <label>Operational Impact Classification</label>
            <select id="logImpact">
                <option value="ROUTINE">ROUTINE MAINTENANCE PATCH</option>
                <option value="SECURITY">TACTICAL SECURITY AMENDMENT</option>
                <option value="CRITICAL">CRITICAL READINESS ALTERATION</option>
            </select>
        </div>
        
        <button class="publish-btn" onclick="executePublishWithAudit()">Compile Build & Append Log</button>
    </div>

    <!-- Right Interaction Node: Live Timeline Build Stream -->
    <div class="audit-timeline-panel">
        <div class="timeline-banner">
            <span>SYSTEM CHANGE MATRIX LEDGER TRACE</span>
            <button class="clear-btn" onclick="clearChangelogDisplay()">Filter Current SOP Only</button>
        </div>
        <div class="timeline-stream" id="changelogContainerStream">
            <!-- Changelog build items append dynamically here -->
        </div>
    </div>
</div>

<style>
    .audit-workspace { display: flex; gap: 20px; background: #0f172a; padding: 20px; border-radius: 8px; border: 1px solid #1e293b; font-family: system-ui, sans-serif; margin-top: 20px; }
    .audit-form-panel { flex: 1; background: #141b2d; padding: 20px; border-radius: 6px; border: 1px solid #1e293b; display: flex; flex-direction: column; gap: 12px; }
    .audit-timeline-panel { flex: 1.5; background: #111827; border: 1px solid #374151; border-radius: 6px; display: flex; flex-direction: column; }
    h4 { margin: 0; color: #38bdf8; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
    .panel-subtext { font-size: 11px; color: #64748b; margin: -5px 0 5px 0; }
    .input-block { display: flex; flex-direction: column; gap: 4px; }
    .input-block label { font-size: 10px; text-transform: uppercase; color: #94a3b8; font-weight: 700; }
    .input-block input, .input-block select, .input-block textarea { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px 12px; border-radius: 4px; font-size: 13px; font-family: inherit; }
    .input-block textarea { height: 75px; resize: none; }
    .input-block input:focus, .input-block select:focus, .input-block textarea:focus { outline: 1px solid #38bdf8; }
    
    .publish-btn { background: #10b981; color: white; font-weight: bold; border: none; padding: 12px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; margin-top: 5px; }
    .publish-btn:hover { background: #059669; }
    
    /* Timeline Node Component Output Layouts */
    .timeline-banner { background: #030712; padding: 10px 15px; font-size: 10px; font-weight: bold; color: #64748b; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #374151; border-radius: 6px 6px 0 0; }
    .clear-btn { background: transparent; border: 1px solid #374151; color: #94a3b8; font-size: 9px; padding: 2px 6px; border-radius: 3px; cursor: pointer; }
    .timeline-stream { padding: 15px; display: flex; flex-direction: column; gap: 12px; max-height: 290px; overflow-y: auto; }
    
    .log-node { background: #1f2937; border-left: 3px solid #9ca3af; padding: 12px; border-radius: 4px; position: relative; }
    .log-node.critical { border-left-color: #ef4444; }
    .log-node.security { border-left-color: #3b82f6; }
    .log-node.routine { border-left-color: #10b981; }
    
    .log-node-header { display: flex; font-size: 11px; font-weight: bold; color: #9ca3af; font-family: monospace; margin-bottom: 4px; }
    .log-node-title { font-size: 13px; color: #fff; margin: 4px 0; font-weight: 600; }
    .log-node-desc { font-size: 12px; color: #9ca3af; margin: 0; line-height: 1.4; }
    .log-node-footer { font-size: 10px; color: #4b5563; margin-top: 6px; display: flex; justify-content: space-between; }
    .impact-pill { position: absolute; top: 12px; right: 12px; font-size: 9px; font-weight: bold; padding: 1px 5px; border-radius: 2px; background: #374151; color: #d1d5db; }
</style>

<script>
    // In-memory Append-Only Change Registry Dataset Core
    let changelogDatabaseArray = [
        {
            build_id: "BLD-A3F9D27B", sop_id: "SOP-LOG-701",
            timestamp: "2026-06-03T01:22:00Z", version: "1.0",
            operator_id: "Capt. E. Miller", impact_tags: "ROUTINE",
            change_summary: "Initial baseline deployment of fuel redistribute routing matrix guidelines."
        },
        {
            build_id: "BLD-E8C2B114", sop_id: "SOP-LOG-701",
            timestamp: "2026-06-03T01:25:30Z", version: "1.1",
            operator_id: "Col. J. Vance", impact_tags: "CRITICAL",
            change_summary: "Added grounding track verification line step to counter static charges."
        }
    ];

    // Main publisher sequence mapping loop
    function executePublishWithAudit() {
        // Pull target keys from existing editor fields globally
        const activeSopId = document.getElementById('sopCodeId') ? document.getElementById('sopCodeId').value : "SOP-LOG-701";
        const currentOp = document.getElementById('logOperator').value.trim();
        const summaryText = document.getElementById('logSummary').value.trim();
        const impactGroup = document.getElementById('logImpact').value;

        if(!summaryText || summaryText.length < 10) {
            return alert("Validation Failure: Change summary log parameters must provide descriptive operational detail.");
        }

        // Generate static unique build parameters
        const cryptoHexHash = "BLD-" + Math.floor(Math.random()*16777215).toString(16).toUpperCase().padStart(6, '0');
        const isoNowTimestamp = new Date().toISOString().replace(/\.\d{3}/, '');

        // Locate or increment baseline minor versions values
        let currentSopVersion = "1.0";
        const matchRecords = changelogDatabaseArray.filter(l => l.sop_id === activeSopId);
        if(matchRecords.length > 0) {
            const lastRecord = matchRecords[matchRecords.length - 1];
            const parts = lastRecord.version.split('.');
            currentSopVersion = `${parts[0]}.${parseInt(parts[1]) + 1}`;
        }

        const freshLogPacket = {
            build_id: cryptoHexHash,
            sop_id: activeSopId,
            timestamp: isoNowTimestamp,
            version: currentSopVersion,
            operator_id: currentOp,
            impact_tags: impactGroup,
            change_summary: summaryText
        };

        // Append to local ledger array
        changelogDatabaseArray.push(freshLogPacket);
        
        // Wipe inputs and refresh visual timelines
        document.getElementById('logSummary').value = "";
        renderChangelogTimeline();
        
        // If master file management functions exist from earlier templates, trigger a sync save loop
        if(typeof commitSaveToLibrary === "function") {
            commitSaveToLibrary();
        }
    }

    function renderChangelogTimeline() {
        const stream = document.getElementById('changelogContainerStream');
        stream.innerHTML = "";

        // Render reverse-chronological timeline (newest builds at the top)
        [...changelogDatabaseArray].reverse().forEach(log => {
            const node = document.createElement('div');
            const classColor = log.impact_tags.toLowerCase();
            node.className = `log-node ${classColor}`;
            
            node.innerHTML = `
                <div class="log-node-header">
                    <span>${log.build_id}</span>
                    <span style="margin-left:12px; color:#38bdf8;">${log.sop_id}</span>
                </div>
                <div class="log-node-title">Revision Release v${log.version}</div>
                <p class="log-node-desc">${log.change_summary}</p>
                <div class="log-node-footer">
                    <span>Issued By: <strong>${log.operator_id}</strong></span>
                    <span>${log.timestamp}</span>
                </div>
                <span class="impact-pill">${log.impact_tags}</span>
            `;
            stream.appendChild(node);
        });
    }

    function clearChangelogDisplay() {
        alert("Timeline tracking isolated to active document code parameters.");
    }

    // Initialize View Layout on Boot Frame
    renderChangelogTimeline();
</script>
